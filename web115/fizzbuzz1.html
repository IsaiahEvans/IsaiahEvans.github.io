<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FizzBuzz 1</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" href="favicon.ico">
<link rel="manifest" href="site.webmanifest">
</head>

<body>
  <div data-include="components/header.html"></div>

  <main>
    <h2>FizzBuzz 1</h2>

    <h3 id="greeting">Welcome to Streamline Studios!</h3>

    <form id="nameForm">
      <label for="first_name">First Name:</label><br>
      <input type="text" id="first_name" placeholder="Enter your first name"><br><br>

      <label for="middle_initial">Middle Initial (optional):</label><br>
      <input type="text" id="middle_initial" maxlength="1" placeholder="M"><br><br>

      <label for="last_name">Last Name:</label><br>
      <input type="text" id="last_name" placeholder="Enter your last name"><br><br>

      <button type="submit">Submit</button>
    </form>

    <div id="output"></div>
  </main>

  <div data-include="components/footer.html"></div>

  <script src="scripts/fizzbuzz1.js"></script>
  <script src="scripts/HTMLInclude.js"></script>
</body>
</html>
