<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Streamline Studios Business Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111111;
font-family:Arial, Helvetica, sans-serif;
}

/* card container */

.card{
  box-sizing:border-box;
  width:850px;
  max-width:90vw;
  min-height:400px;
  background:#1a1a1a;
  border-radius:12px;
  box-shadow:0 25px 60px rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:60px;
  color:white;
  border-left:8px solid #2d6cdf;
}

/* left side */

.info{
line-height:1.8;
}

.name{
font-size:36px;
font-weight:bold;
}

.title{
color:#2d6cdf;
font-size:22px;
margin-bottom:20px;
}

.contact{
font-size:18px;
}

/* right side logo */

.logo{
text-align:center;
}

.logo img{
width:220px;
}

/* responsive */

@media(max-width:900px){

.card{
width:90%;
height:auto;
flex-direction:column;
text-align:center;
}

.logo{
margin-top:30px;
}

  .logo img{
  width:220px;
  height:auto;
  display:block;
}
  
}

</style>
</head>

<body>

<div class="card">

<div class="info">

<div class="name">Isaiah Evans</div>
<div class="title">Creative Media Director</div>

<div class="contact">
📧 isaiah@streamlinestudiosmedia.com
</div>

<div class="contact">
📞 (717) 555-4832
</div>

<div class="contact">
🌐 www.streamlinestudiosmedia.com
</div>

<div class="contact">
📍 245 Market Street Suite 204<br>
Harrisburg, PA 17101
</div>

<div class="contact">
📷 @_streamlinestudios
</div>

</div>

<div class="logo">
<img src="../images/logo.jpg" alt="Streamline Studios">
</div>

</div>

<script src="https://lint.page/kit/880bd5.js" crossorigin="anonymous"></script>

</body>
</html>
